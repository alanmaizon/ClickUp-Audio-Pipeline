name: Process ClickUp Audio

on:
  schedule:
    - cron: "30 11 * * 1"  # Every Monday at 11:30 UTC (12:30 IST summer)
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install --retries 3 --timeout 60 webrtcvad-wheels faster-whisper noisereduce soundfile
          sudo apt-get install -y libsndfile1

      - name: Run pipeline
        env:
          API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          VIEW_ID: ${{ secrets.CLICKUP_VIEW_ID }}
        run: python run_pipeline.py --clean
